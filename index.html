<script>
const chatMsgs = document.getElementById('chatMsgs');
const chatInput = document.getElementById('chatInput');

function addMsg(role, text) {
  const msg = document.createElement('div');
  msg.innerHTML = `<b>${role}:</b> ${text}`;
  chatMsgs.appendChild(msg);
}

function showTyping() {
  const typing = document.createElement('div');
  typing.id = "typing";
  typing.innerText = "Assistant is typing...";
  chatMsgs.appendChild(typing);
}

function removeTyping() {
  const t = document.getElementById("typing");
  if (t) t.remove();
}

async function sendMsg(override) {
  const text = (override || chatInput.value).trim();
  if (!text) return;

  chatInput.value = '';
  addMsg('You', text);

  showTyping();

  // 🔥 REPLACED API WITH SMART RESPONSE
  setTimeout(() => {
    removeTyping();

    let reply = "";
    const q = text.toLowerCase();

    if (q.includes("register")) {
      reply = "To register as a voter:\n1. Fill Form 6\n2. Submit ID proof (Aadhaar/Passport)\n3. Verify your details\n\nWould you like the official registration link?";
    } 
    else if (q.includes("vote")) {
      reply = "On voting day:\n1. Visit your polling booth\n2. Show valid ID\n3. Cast your vote using EVM\n\nWould you like to know accepted ID types?";
    } 
    else if (q.includes("evm")) {
      reply = "EVM (Electronic Voting Machine) allows you to securely cast your vote by pressing a button next to your chosen candidate.";
    }
    else if (q.includes("timeline") || q.includes("election")) {
      reply = "Election process:\nRegistration → Campaign → Voting → Counting → Results\n\nWhich part would you like to explore?";
    }
    else {
      reply = "I can help you with voter registration, voting process, EVMs, or election timelines. What would you like to know?";
    }

    addMsg('Assistant', reply);
  }, 800);
}
</script>
